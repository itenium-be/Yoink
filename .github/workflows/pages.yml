name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['site/**', 'settings.schema.json', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let in-progress deploys finish; only the newest queued run survives.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # Schema lives at repo root (PowerShell loads it via $PSScriptRoot); publish a
      # copy so its $id URL (itenium-be.github.io/Yoink/settings.schema.json) resolves.
      - run: cp settings.schema.json site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
